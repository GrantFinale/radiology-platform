global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # ─────────────────────────────────────────────
  # Prometheus self-monitoring
  # ─────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]
        labels:
          service: "api-gateway"

  # ─────────────────────────────────────────────
  # Order Service
  # ─────────────────────────────────────────────
  - job_name: "order-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:3001"]
        labels:
          service: "order-service"

  # ─────────────────────────────────────────────
  # Document Service
  # ─────────────────────────────────────────────
  - job_name: "document-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["document-service:3002"]
        labels:
          service: "document-service"

  # ─────────────────────────────────────────────
  # NLP Service
  # ─────────────────────────────────────────────
  - job_name: "nlp-service"
    metrics_path: /health
    static_configs:
      - targets: ["nlp-service:3003"]
        labels:
          service: "nlp-service"

  # ─────────────────────────────────────────────
  # Integration Service
  # ─────────────────────────────────────────────
  - job_name: "integration-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["integration-service:3004"]
        labels:
          service: "integration-service"
