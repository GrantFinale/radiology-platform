global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "webhook"

  routes:
    - match:
        severity: critical
      receiver: "webhook"
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: "webhook"
      repeat_interval: 4h

receivers:
  - name: "webhook"
    webhook_configs:
      - url: "http://api-gateway:3000/api/v1/webhooks/alerts"
        send_resolved: true
        max_alerts: 10

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "job"]
